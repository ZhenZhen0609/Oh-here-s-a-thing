<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oh, Here's a thing</title>
    <style>
        :root {
            --bg: #f2f4f7;
            --text-main: #1d1d1f;
            --text-sub: #a1a1a6;
            --color-quick: rgba(52, 199, 89, 0.12);
            --color-quick-text: #248a3d;
            --color-focus: rgba(255, 159, 10, 0.12);
            --color-focus-text: #b27006;
            --color-immerse: rgba(88, 86, 214, 0.12);
            --color-immerse-text: #4844b5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, #f2f4f7 100%);
            color: var(--text-main);
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            height: 100vh; 
            /* 适配移动端高度 */
            height: -webkit-fill-available;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        header { 
            padding: 40px 25px 0; 
            z-index: 10; 
            pointer-events: none;
            flex-shrink: 0;
        }
        h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .subtitle { font-size: 13px; color: var(--text-sub); margin-top: 4px; }

        #pool {
            flex: 1;
            position: relative;
            margin: 0;
            overflow: visible;
            cursor: default;
            z-index: 5;
        }

        /* 气泡样式 */
        .thing {
            position: absolute;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.04);
            display: flex; align-items: center; justify-content: center;
            text-align: center;
            user-select: none;
            animation: floating var(--float-duration) ease-in-out infinite;
            max-width: 70vw; /* 防止长文本超出屏幕 */
            word-wrap: break-word;
        }

        @keyframes floating {
            0%, 100% { transform: translate(0, 0) rotate(var(--base-rotate)); }
            50% { transform: translate(var(--float-x), var(--float-y)) rotate(calc(var(--base-rotate) + 2deg)); }
        }

        .vibe-quick { background: var(--color-quick); color: var(--color-quick-text); min-width: 80px; }
        .vibe-focus { background: var(--color-focus); color: var(--color-focus-text); min-width: 100px; }
        .vibe-immerse { background: var(--color-immerse); color: var(--color-immerse-text); min-width: 130px; padding: 18px 28px; }

        .thing.highlight {
            animation: jump 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate !important;
            z-index: 1000 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.8), 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid white;
        }

        @keyframes jump {
            0% { transform: translateY(0) scale(1.1); }
            100% { transform: translateY(-20px) scale(1.15); }
        }

        .thing.popping {
            animation: explode 0.4s ease-out forwards !important;
            pointer-events: none;
        }

        @keyframes explode {
            0% { transform: scale(1); opacity: 1; filter: blur(0px); }
            30% { transform: scale(0.85); opacity: 1; }
            100% { transform: scale(1.6); opacity: 0; filter: blur(15px); }
        }

        /* 底部控制台适配 */
        .controls {
            padding: 15px 15px calc(15px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 80%, transparent);
            z-index: 100;
            flex-shrink: 0;
        }

        /* 抽取按钮 - 改为网格布局适配窄屏 */
        .picker-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .picker-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.03);
            padding: 10px 0;
            border-radius: 12px;
            font-size: 11px;
            white-space: nowrap;
            font-weight: 600;
            color: var(--text-sub);
            cursor: pointer;
            text-align: center;
        }
        .picker-btn.primary { background: var(--text-main); color: white; border: none; }

        /* 输入条适配 */
        .input-bar {
            background: #fff;
            border-radius: 20px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
        }
        input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px; /* 防止 iOS 自动放大 */
            color: var(--text-main);
            background: transparent;
            min-width: 0; /* 允许 input 缩小 */
        }

        .emit-group {
            display: flex;
            gap: 5px;
            flex-shrink: 0; /* 禁止色块缩小 */
        }
        .emit-btn {
            padding: 10px 10px;
            border-radius: 12px;
            border: none;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }
        .emit-btn.quick { background: var(--color-quick); color: var(--color-quick-text); }
        .emit-btn.focus { background: var(--color-focus); color: var(--color-focus-text); }
        .emit-btn.immerse { background: var(--color-immerse); color: var(--color-immerse-text); }

        .empty-state {
            position: absolute; top: 40%; left: 0; right: 0;
            text-align: center; pointer-events: none;
            padding: 0 40px;
        }
        .empty-text {
            font-size: 14px;
            color: #ccc;
            font-weight: 400;
            line-height: 1.6;
        }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

    <header>
        <h1>Oh, Here's a thing...</h1>
        <p class="subtitle">Catch the thoughts, release the mind.</p>
    </header>

    <div id="pool">
        <div class="empty-state" id="empty-hint">
            <p class="empty-text">Be the life you love to see in this world.</p>
        </div>
    </div>

    <div class="controls" onclick="event.stopPropagation()">
        <div class="picker-group">
            <button class="picker-btn" onclick="pickRandom('quick')">5分碎片</button>
            <button class="picker-btn" onclick="pickRandom('focus')">专注半时</button>
            <button class="picker-btn" onclick="pickRandom('immerse')">沉浸任务</button>
            <button class="picker-btn primary" onclick="pickRandom('any')">随机开启</button>
        </div>

        <div class="input-bar">
            <input type="text" id="new-thing" placeholder="Something on your mind?" onkeypress="if(event.key==='Enter') addThing('quick')">
            <div class="emit-group">
                <button class="emit-btn quick" onclick="addThing('quick')">轻量</button>
                <button class="emit-btn focus" onclick="addThing('focus')">专注</button>
                <button class="emit-btn immerse" onclick="addThing('immerse')">深度</button>
            </div>
        </div>
    </div>

    <script>
        let things = JSON.parse(localStorage.getItem('oht_v3_mobile_data')) || [];

        function saveData() {
            localStorage.setItem('oht_v3_mobile_data', JSON.stringify(things));
            render();
        }

        function haptic(ms) {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(ms);
        }

        function addThing(vibe) {
            const input = document.getElementById('new-thing');
            const text = input.value.trim();
            if (!text) return;

            const newItem = {
                id: Date.now(),
                text: text,
                vibe: vibe,
                x: 10 + Math.random() * 65,
                y: 10 + Math.random() * 60,
                rotate: Math.floor(Math.random() * 10) - 5,
                fx: (Math.random() * 20 - 10).toFixed(1) + 'px',
                fy: (Math.random() * 20 - 10).toFixed(1) + 'px',
                duration: (4 + Math.random() * 4).toFixed(1) + 's'
            };

            things.push(newItem);
            input.value = '';
            input.blur(); // 隐藏键盘
            haptic(15);
            clearHighlights();
            saveData();
        }

        function popThing(id, el, event) {
            event.stopPropagation();
            haptic(30);
            el.classList.add('popping');
            setTimeout(() => {
                things = things.filter(t => t.id !== id);
                saveData();
            }, 400);
        }

        function clearHighlights() {
            document.querySelectorAll('.thing').forEach(el => el.classList.remove('highlight'));
        }

        function handleGlobalClick(e) {
            clearHighlights();
        }

        function pickRandom(filter) {
            const poolItems = document.querySelectorAll('.thing');
            if(poolItems.length === 0) return;

            let targets = Array.from(poolItems);
            if(filter !== 'any') {
                targets = targets.filter(el => el.dataset.vibe === filter);
            }

            if(targets.length === 0) return;

            haptic(20);
            clearHighlights();

            const luckyOne = targets[Math.floor(Math.random() * targets.length)];
            
            luckyOne.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => luckyOne.classList.add('highlight'), 100);
        }

        function render() {
            const pool = document.getElementById('pool');
            const hint = document.getElementById('empty-hint');
            
            pool.querySelectorAll('.thing').forEach(ot => pool.removeChild(ot));

            things.forEach(t => {
                const div = document.createElement('div');
                div.className = `thing vibe-${t.vibe}`;
                div.dataset.vibe = t.vibe;
                div.innerText = t.text;
                
                div.style.left = `${t.x}%`;
                div.style.top = `${t.y}%`;
                div.style.setProperty('--base-rotate', `${t.rotate}deg`);
                div.style.setProperty('--float-x', t.fx);
                div.style.setProperty('--float-y', t.fy);
                div.style.setProperty('--float-duration', t.duration);
                div.style.zIndex = Math.floor(t.y);

                div.onclick = (e) => popThing(t.id, div, e);
                pool.appendChild(div);
            });

            hint.style.display = things.length === 0 ? 'block' : 'none';
        }

        render();
    </script>
</body>
</html>
