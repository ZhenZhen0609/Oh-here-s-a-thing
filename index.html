<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oh, Here's a thing</title>
    <style>
        :root {
            --bg: #f2f4f7;
            --text-main: #1d1d1f;
            --text-sub: #a1a1a6;
            --color-quick: rgba(52, 199, 89, 0.12);
            --color-quick-text: #248a3d;
            --color-focus: rgba(255, 159, 10, 0.12);
            --color-focus-text: #b27006;
            --color-immerse: rgba(88, 86, 214, 0.12);
            --color-immerse-text: #4844b5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* 基础自适应结构 */
        html, body {
            height: 100%;
            height: 100dvh; /* 适配移动端动态高度 */
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, sans-serif;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column; /* 垂直排布：头、池子、控制台 */
        }

        header {
            padding: 30px 25px 10px;
            flex-shrink: 0; /* 头部大小固定，不参与缩放 */
        }
        h1 { font-size: 24px; font-weight: 700; }
        .subtitle { font-size: 13px; color: var(--text-sub); }

        /* 中间池子：核心自适应区域 */
        #pool {
            flex: 1; /* 自动撑开，占据屏幕剩下的所有空间 */
            position: relative;
            margin: 0 10px;
            z-index: 5;
            overflow: visible;
        }

        /* 气泡样式 */
        .thing {
            position: absolute;
            padding: 12px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.03);
            text-align: center;
            user-select: none;
            animation: floating var(--float-duration) ease-in-out infinite;
            max-width: 80vw;
        }

        @keyframes floating {
            0%, 100% { transform: translate(0, 0) rotate(var(--base-rotate)); }
            50% { transform: translate(var(--float-x), var(--float-y)) rotate(calc(var(--base-rotate) + 2deg)); }
        }

        .vibe-quick { background: var(--color-quick); color: var(--color-quick-text); }
        .vibe-focus { background: var(--color-focus); color: var(--color-focus-text); }
        .vibe-immerse { background: var(--color-immerse); color: var(--color-immerse-text); }

        /* 选中态 */
        .thing.highlight {
            animation: jump 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) infinite alternate !important;
            z-index: 1000 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
            border: 2px solid white;
        }
        @keyframes jump { 0% { transform: translateY(0) scale(1.1); } 100% { transform: translateY(-15px) scale(1.15); } }

        /* 爆炸 */
        .thing.popping { animation: explode 0.4s ease-out forwards !important; }
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.6); opacity: 0; filter: blur(15px); } }

        /* 底部控制台：始终贴底，高度自适应内容 */
        .controls {
            padding: 10px 20px calc(20px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg) 90%, transparent);
            flex-shrink: 0;
            z-index: 100;
        }

        /* 抽取按钮：网格自适应 */
        .picker-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .picker-btn {
            background: white;
            border: 1px solid rgba(0,0,0,0.03);
            padding: 10px 0;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-sub);
            text-align: center;
        }
        .picker-btn.primary { background: var(--text-main); color: white; }

        /* 输入条：精简文案适配手机 */
        .input-bar {
            background: #fff;
            border-radius: 18px;
            padding: 5px 5px 5px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px; /* 防止缩放 */
            color: var(--text-main);
            background: transparent;
            min-width: 0;
        }

        .emit-group { display: flex; gap: 4px; }
        .emit-btn {
            padding: 10px 11px;
            border-radius: 12px;
            border: none;
            font-size: 11px;
            font-weight: 700;
        }
        .emit-btn.quick { background: var(--color-quick); color: var(--color-quick-text); }
        .emit-btn.focus { background: var(--color-focus); color: var(--color-focus-text); }
        .emit-btn.immerse { background: var(--color-immerse); color: var(--color-immerse-text); }

        /* 居中提示语 */
        .empty-state {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
            pointer-events: none;
        }
        .empty-text { font-size: 14px; color: #d1d1d6; }
    </style>
</head>
<body onclick="clearHighlights()">

    <header>
        <h1>Oh, Here's a thing...</h1>
    </header>

    <div id="pool">
        <div class="empty-state" id="empty-hint">
            <p class="empty-text">Be the life you love to see in this world.</p>
        </div>
    </div>

    <div class="controls" onclick="event.stopPropagation()">
        <div class="picker-group">
            <button class="picker-btn" onclick="pickRandom('quick')">Nica(轻)</button>
            <button class="picker-btn" onclick="pickRandom('focus')">Farea(中)</button>
            <button class="picker-btn" onclick="pickRandom('immerse')">Raita(长)</button>
            <button class="picker-btn primary" onclick="pickRandom('any')">Sira(随意)</button>
        </div>

        <div class="input-bar">
            <!-- 缩短了 placeholder -->
            <input type="text" id="new-thing" placeholder="dear friend..." onkeypress="if(event.key==='Enter') addThing('quick')">
            <div class="emit-group">
                <button class="emit-btn quick" onclick="addThing('quick')"></button>
                <button class="emit-btn focus" onclick="addThing('focus')"></button>
                <button class="emit-btn immerse" onclick="addThing('immerse')"></button>
            </div>
        </div>
    </div>

    <script>
        let things = JSON.parse(localStorage.getItem('oht_v5_adaptive')) || [];

        function saveData() {
            localStorage.setItem('oht_v5_adaptive', JSON.stringify(things));
            render();
        }

        function haptic(ms) {
            if (window.navigator && window.navigator.vibrate) window.navigator.vibrate(ms);
        }

        function addThing(vibe) {
            const input = document.getElementById('new-thing');
            const text = input.value.trim();
            if (!text) return;

            things.push({
                id: Date.now(),
                text: text,
                vibe: vibe,
                // 使用百分比位置，它们会在自动撑开的 #pool 内部随机
                x: 10 + Math.random() * 70,
                y: 10 + Math.random() * 80, 
                rotate: Math.floor(Math.random() * 10) - 5,
                fx: (Math.random() * 20 - 10).toFixed(1) + 'px',
                fy: (Math.random() * 20 - 10).toFixed(1) + 'px',
                duration: (4 + Math.random() * 4).toFixed(1) + 's'
            });

            input.value = '';
            input.blur(); 
            haptic(15);
            clearHighlights();
            saveData();
        }

        function popThing(id, el, event) {
            event.stopPropagation();
            haptic(30);
            el.classList.add('popping');
            setTimeout(() => {
                things = things.filter(t => t.id !== id);
                saveData();
            }, 400);
        }

        function clearHighlights() {
            document.querySelectorAll('.thing').forEach(el => el.classList.remove('highlight'));
        }

        function pickRandom(filter) {
            const poolItems = document.querySelectorAll('.thing');
            if(poolItems.length === 0) return;
            let targets = Array.from(poolItems);
            if(filter !== 'any') targets = targets.filter(el => el.dataset.vibe === filter);
            if(targets.length === 0) return;

            haptic(20);
            clearHighlights();
            const luckyOne = targets[Math.floor(Math.random() * targets.length)];
            luckyOne.classList.add('highlight');
        }

        function render() {
            const pool = document.getElementById('pool');
            const hint = document.getElementById('empty-hint');
            pool.querySelectorAll('.thing').forEach(ot => pool.removeChild(ot));

            things.forEach(t => {
                const div = document.createElement('div');
                div.className = `thing vibe-${t.vibe}`;
                div.dataset.vibe = t.vibe;
                div.innerText = t.text;
                div.style.left = `${t.x}%`;
                div.style.top = `${t.y}%`;
                div.style.setProperty('--base-rotate', `${t.rotate}deg`);
                div.style.setProperty('--float-x', t.fx);
                div.style.setProperty('--float-y', t.fy);
                div.style.setProperty('--float-duration', t.duration);
                div.style.zIndex = Math.floor(t.y);
                div.onclick = (e) => popThing(t.id, div, e);
                pool.appendChild(div);
            });
            hint.style.display = things.length === 0 ? 'block' : 'none';
        }
        render();
    </script>
</body>
</html>
